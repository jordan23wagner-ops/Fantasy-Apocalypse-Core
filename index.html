<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Apocalypse - Combat & Loot Prototype</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; background: #1a1a1a; border: 4px solid #333; margin: 20px auto; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; width: 250px; }
        #inventory { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; height: 300px; overflow-y: auto; }
        .stat { color: #f0ad4e; font-weight: bold; }
        .inv-item { font-size: 12px; border-bottom: 1px solid #333; padding: 5px 0; }
        .header { font-weight: bold; color: #007bff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #log { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header">Nexus Engine v0.0.2</div>
        <div style="font-size: 12px; margin-bottom: 10px;">WASD: Move | Click: Attack | Space: Interact</div>
        <div id="player-stats">
            HP: <span id="hp" class="stat" style="color:#ff4d4d">100</span> | 
            LVL: <span id="lvl" class="stat">1</span><br>
            XP: <span id="xp" class="stat">0</span>/100
        </div>
    </div>

    <div id="inventory">
        <div class="header">Backpack</div>
        <div id="inv-list"></div>
    </div>

    <div id="log">Nexus: Systems initialized. Good luck, Jordan.</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;

        const player = { 
            x: 500, y: 350, size: 30, speed: 4, hp: 100, maxHp: 100, 
            xp: 0, lvl: 1, 
            inventory: [],
            lastAttack: 0, attackCooldown: 300
        };

        const keys = {};
        const projectiles = [];
        const enemies = [];
        const particles = [];
        const worldObjects = [
            { type: 'tree', x: 200, y: 200, emoji: '🌲', label: 'Iron-Bark' },
            { type: 'tree', x: 800, y: 550, emoji: '🌲', label: 'Iron-Bark' },
            { type: 'ore', x: 150, y: 600, emoji: '💎', label: 'Mana-Vein' },
            { type: 'ore', x: 850, y: 150, emoji: '💎', label: 'Mana-Vein' },
        ];

        const enemyTypes = [
            { type: 'slime', emoji: '🧪', hp: 30, speed: 1.5, xp: 20, loot: 'Slime Core', label: 'Mutated Slime' },
            { type: 'skeleton', emoji: '💀', hp: 60, speed: 1.0, xp: 45, loot: 'Ancient Bone', label: 'Blighted Remains' },
            { type: 'wasp', emoji: '🐝', hp: 15, speed: 3.5, xp: 30, loot: 'Stinger', label: 'Mana-Stinger' },
            { type: 'hound', emoji: '🐕', hp: 40, speed: 2.5, xp: 35, loot: 'Scavenged Leather', label: 'Scavenger Hound' },
            { type: 'wraith', emoji: '👻', hp: 100, speed: 0.8, xp: 150, loot: 'Void Essence', label: 'Void Wraith' },
            { type: 'golem', emoji: '🗿', hp: 250, speed: 0.5, xp: 500, loot: 'Mana-Crystal', label: 'Cursed Golem (ELITE)' }
        ];

        // Enemy Spawner
        function spawnEnemy() {
            if (enemies.length < 12) {
                const rand = Math.random();
                let config;
                
                // Rarity Logic: Golems and Wraiths are rarer
                if (rand < 0.05) config = enemyTypes[5]; // Golem (5%)
                else if (rand < 0.15) config = enemyTypes[4]; // Wraith (10%)
                else config = enemyTypes[Math.floor(Math.random() * 4)]; // Others
                enemies.push({
                    x: Math.random() < 0.5 ? 0 : canvas.width,
                    y: Math.random() * canvas.height,
                    hp: config.hp,
                    maxHp: config.hp,
                    size: 25,
                    speed: config.speed + (player.lvl * 0.1),
                    emoji: config.emoji,
                    label: config.label,
                    xp: config.xp,
                    loot: config.loot
                });
            }
        }
        setInterval(spawnEnemy, 2500);

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => {
            const now = Date.now();
            if (now - player.lastAttack > player.attackCooldown) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
                
                projectiles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * 8,
                    vy: Math.sin(angle) * 8,
                    size: 5,
                    life: 60
                });
                player.lastAttack = now;
            }
        });

        function update() {
            // Movement
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;

            // Constrain player
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                // Collision with enemies
                enemies.forEach(en => {
                    if (Math.hypot(p.x - en.x, p.y - en.y) < en.size) {
                        en.hp -= 10;
                        p.life = 0;
                        createParticles(en.x, en.y, '#00ff00');
                    }
                });

                if (p.life <= 0) projectiles.splice(i, 1);
            }

            // Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                en.x += Math.cos(angle) * en.speed;
                en.y += Math.sin(angle) * en.speed;

                // Hit player
                if (Math.hypot(en.x - player.x, en.y - player.y) < player.size) {
                    player.hp -= 0.2; // Constant damage while touching
                    if (player.hp < 0) player.hp = 0;
                    updateUI();
                }

                if (en.hp <= 0) {
                    createParticles(en.x, en.y, '#f0ad4e', 10);
                    addToInventory(en.loot);
                    player.xp += en.xp;
                    if (player.xp >= 100) {
                        player.lvl++;
                        player.xp = 0;
                        player.maxHp += 20;
                        player.hp = player.maxHp;
                    }
                    enemies.splice(i, 1);
                    updateUI();
                }
            }

            // Interact with World
            if (keys[' ']) {
                worldObjects.forEach(obj => {
                    const dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                    if (dist < 50) {
                        addToInventory(obj.type === 'tree' ? 'Iron-Bark Log' : 'Mana-Infused Ore');
                        createParticles(obj.x, obj.y, obj.type === 'tree' ? '#2d5a27' : '#555');
                        keys[' '] = false; // Debounce
                    }
                });
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function addToInventory(item) {
            player.inventory.push(item);
            if (player.inventory.length > 15) player.inventory.shift(); // Max 15 for demo
            const list = document.getElementById('inv-list');
            list.innerHTML = player.inventory.map(i => `<div class="inv-item">${i}</div>`).reverse().join('');
        }

        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 5, 
                    vy: (Math.random() - 0.5) * 5, 
                    color, 
                    life: 1 
                });
            }
        }

        function updateUI() {
            document.getElementById('hp').innerText = Math.ceil(player.hp);
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp').innerText = player.xp;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw World Objects
            worldObjects.forEach(obj => {
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText(obj.emoji, obj.x, obj.y);
                ctx.font = "10px Arial";
                ctx.fillStyle = "#888";
                ctx.fillText(obj.label, obj.x, obj.y + 20);
            });

            // Draw Enemies
            enemies.forEach(en => {
                ctx.font = "30px Arial";
                ctx.fillText(en.emoji, en.x, en.y);
                // HP Bar
                ctx.fillStyle = "#333";
                ctx.fillRect(en.x - 15, en.y - 30, 30, 4);
                ctx.fillStyle = "#ff4d4d";
                ctx.fillRect(en.x - 15, en.y - 30, (en.hp / en.maxHp) * 30, 4);
            });

            // Draw Projectiles
            ctx.fillStyle = "#007bff";
            projectiles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;

            // Draw Player
            ctx.font = "40px Arial";
            ctx.fillText("🧙", player.x, player.y);

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
