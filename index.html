<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Apocalypse - Economy & Magic</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; background: #111; border: 4px solid #444; margin: 20px auto; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; border: 1px solid #555; pointer-events: none; width: 260px; }
        #inventory { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; border: 1px solid #555; width: 220px; height: 350px; overflow-y: auto; }
        #crafting { position: absolute; bottom: 50px; right: 10px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; border: 1px solid #555; width: 220px; }
        .stat { font-weight: bold; }
        .inv-item { font-size: 11px; border-bottom: 1px solid #333; padding: 4px 0; display: flex; justify-content: space-between; }
        .header { font-weight: bold; color: #007bff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; border-bottom: 1px solid #444; }
        #log { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px; font-size: 11px; color: #aaa; border-radius: 4px; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 6px; width: 100%; margin: 3px 0; cursor: pointer; font-size: 10px; border-radius: 3px; pointer-events: auto; }
        button:disabled { color: #555; cursor: not-allowed; opacity: 0.4; }
        button:hover:not(:disabled) { background: #444; border-color: #007bff; }
        .bar { height: 8px; background: #222; border-radius: 4px; margin-top: 4px; overflow: hidden; }
        #hp-fill { height: 100%; background: #ff4d4d; transition: width 0.3s; }
        #mp-fill { height: 100%; background: #007bff; transition: width 0.3s; }
        #xp-fill { height: 100%; background: #f0ad4e; transition: width 0.3s; }
        .gem-icon { color: #00ffcc; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header">Nexus Engine v0.0.7</div>
        <div id="player-stats">
            HP <span id="hp-text" class="stat">100/100</span>
            <div class="bar"><div id="hp-fill" style="width: 100%"></div></div>
            MANA <span id="mp-text" class="stat">50/50</span>
            <div class="bar"><div id="mp-fill" style="width: 100%"></div></div>
            XP <span id="xp-text" class="stat">LVL 1</span>
            <div class="bar"><div id="xp-fill" style="width: 0%"></div></div>
        </div>
        <div style="margin-top: 10px; font-size: 13px;">
            GEMS: <span id="gem-count" class="stat gem-icon">0</span> 💎
        </div>
        <div id="biome-info" style="font-size: 11px; color: #888; margin-top: 5px;">Starting Forest (0,0)</div>
    </div>

    <div id="inventory">
        <div class="header">Backpack</div>
        <div id="inv-list"></div>
    </div>

    <div id="crafting">
        <div class="header">Town Hub Logic</div>
        <button id="btn-heal" onclick="interactHub('heal')" disabled>Heal HP (10 Gems)</button>
        <button id="btn-sell" onclick="interactHub('sell')" disabled>Sell All Loot</button>
        <div class="header" style="margin-top:10px;">Mana-Forge</div>
        <button onclick="craft('Scavenger Bow')" id="btn-bow" disabled>Craft Bow (2 Lthr, 1 Log)</button>
        <button onclick="craft('Bone Staff')" id="btn-staff" disabled>Craft Staff (3 Bone, 1 Ore)</button>
        <button onclick="craft('Void Scepter')" id="btn-scepter" disabled>Craft Scepter (1 Void, 2 Crys)</button>
        <div id="equipment" style="margin-top:10px; font-size: 11px; color: #00ff00; text-align:center;">Wpn: Basic Bolt</div>
    </div>

    <div id="log">Nexus: Mana levels detected. Economy protocols established.</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;

        let player = { 
            x: 500, y: 350, size: 25, speed: 4, 
            hp: 100, maxHp: 100, 
            mp: 50, maxMp: 50, mpRegen: 0.1,
            xp: 0, lvl: 1, gems: 0,
            inventory: [],
            weapon: 'Basic Bolt',
            damage: 10,
            projSpeed: 8,
            manaCost: 2,
            lastAttack: 0, attackCooldown: 350,
            dashCooldown: 0, dashTimer: 0, isDashing: false, dashVx: 0, dashVy: 0,
            worldX: 0, worldY: 0
        };

        const keys = {};
        const projectiles = [];
        const enemyProjectiles = [];
        const enemies = [];
        const particles = [];
        
        const biomes = {
            '0,0': { name: 'Town/Forest Hub', color: '#1a2a1a', tile: '#1e301e', objects: [{t:'hub',x:500,y:350,e:'🏠'}, {t:'tree',x:200,y:200,e:'🌲'}], spawn: ['slime'] },
            '1,0': { name: 'Desolate Ruins', color: '#2a221a', tile: '#332a20', objects: [{t:'ore',x:500,y:300,e:'💎'}, {t:'ore',x:200,y:600,e:'💎'}], spawn: ['skeleton', 'hound'] },
            '0,1': { name: 'Mana Swamp', color: '#1a1a2a', tile: '#1e1e33', objects: [{t:'pond',x:400,y:400,e:'🌀'}, {t:'tree',x:700,y:100,e:'🌲'}], spawn: ['caster', 'slime'] },
            '1,1': { name: 'The Void Crater', color: '#111', tile: '#1a1a1a', objects: [{t:'ore',x:800,y:100,e:'💎'}, {t:'hub',x:500,y:500,e:'🏠'}], spawn: ['wraith', 'golem'] }
        };

        const enemyTypes = {
            'slime': { emoji: '🧪', hp: 30, speed: 1.5, xp: 20, loot: 'Slime Core', gems: [2,5] },
            'skeleton': { emoji: '💀', hp: 60, speed: 1.0, xp: 45, loot: 'Ancient Bone', gems: [5,12] },
            'wasp': { emoji: '🐝', hp: 15, speed: 3.5, xp: 30, loot: 'Stinger', gems: [3,8] },
            'hound': { emoji: '🐕', hp: 40, speed: 2.5, xp: 35, loot: 'Scavenged Leather', gems: [4,10] },
            'caster': { emoji: '🧙‍♂️', hp: 55, speed: 0.7, xp: 90, loot: 'Mana-Essence', gems: [15,25] },
            'wraith': { emoji: '👻', hp: 120, speed: 0.9, xp: 200, loot: 'Void Essence', gems: [30,50] },
            'golem': { emoji: '🗿', hp: 350, speed: 0.4, xp: 600, loot: 'Mana-Crystal', gems: [100,200] }
        };

        function saveGame() {
            localStorage.setItem('nexus_save_v2', JSON.stringify(player));
        }

        function loadGame() {
            const saved = localStorage.getItem('nexus_save_v2');
            if (saved) {
                player = {...player, ...JSON.parse(saved)};
                updateUI();
            }
        }

        function spawnEnemy() {
            const biomeKey = `${player.worldX},${player.worldY}`;
            const biome = biomes[biomeKey] || biomes['0,0'];
            if (enemies.length < 10) {
                const type = biome.spawn[Math.floor(Math.random() * biome.spawn.length)];
                const config = enemyTypes[type];
                enemies.push({
                    x: Math.random() < 0.5 ? 0 : canvas.width,
                    y: Math.random() * canvas.height,
                    hp: config.hp, maxHp: config.hp, size: 25,
                    speed: config.speed + (player.lvl * 0.1),
                    emoji: config.emoji, xp: config.xp, loot: config.loot, type: type, 
                    gems: Math.floor(Math.random() * (config.gems[1]-config.gems[0])) + config.gems[0],
                    lastShot: 0
                });
            }
        }

        function interactHub(action) {
            if (action === 'heal' && player.gems >= 10) {
                player.gems -= 10;
                player.hp = player.maxHp;
                document.getElementById('log').innerText = "Hub: Health restored. Carry on.";
            } else if (action === 'sell') {
                const sellCount = player.inventory.length;
                player.gems += sellCount * 5; // 5 gems per item
                player.inventory = [];
                document.getElementById('log').innerText = `Hub: Sold ${sellCount} items for ${sellCount * 5} Gems.`;
            }
            updateUI(); saveGame();
        }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'Shift' && Date.now() > player.dashCooldown) {
                let dx = 0, dy = 0;
                if (keys['w']) dy = -1; if (keys['s']) dy = 1;
                if (keys['a']) dx = -1; if (keys['d']) dx = 1;
                if (dx !== 0 || dy !== 0) {
                    player.isDashing = true; player.dashTimer = 10;
                    player.dashVx = dx * 13; player.dashVy = dy * 13;
                    player.dashCooldown = Date.now() + 1200;
                    createParticles(player.x, player.y, '#fff', 15);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => {
            const now = Date.now();
            if (now - player.lastAttack > player.attackCooldown && player.mp >= player.manaCost) {
                const rect = canvas.getBoundingClientRect();
                const angle = Math.atan2((e.clientY - rect.top) - player.y, (e.clientX - rect.left) - player.x);
                player.mp -= player.manaCost;
                projectiles.push({ 
                    x: player.x, y: player.y, 
                    vx: Math.cos(angle) * player.projSpeed, 
                    vy: Math.sin(angle) * player.projSpeed, 
                    size: player.weapon === 'Void Scepter' ? 12 : 5, 
                    color: player.weapon === 'Void Scepter' ? '#a020f0' : '#007bff',
                    life: 70 
                });
                player.lastAttack = now;
                updateUI();
            }
        });

        function update() {
            const now = Date.now();
            
            // Mana Regen
            player.mp = Math.min(player.maxMp, player.mp + player.mpRegen);
            updateUI();

            if (player.isDashing) {
                player.x += player.dashVx; player.y += player.dashVy;
                player.dashTimer--; if (player.dashTimer <= 0) player.isDashing = false;
            } else {
                if (keys['w']) player.y -= player.speed;
                if (keys['s']) player.y += player.speed;
                if (keys['a']) player.x -= player.speed;
                if (keys['d']) player.x += player.speed;
            }

            if (player.x < 0) { player.worldX--; player.x = canvas.width - 40; resetBiome(); }
            if (player.x > canvas.width) { player.worldX++; player.x = 40; resetBiome(); }
            if (player.y < 0) { player.worldY--; player.y = canvas.height - 40; resetBiome(); }
            if (player.y > canvas.height) { player.worldY++; player.y = 40; resetBiome(); }

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                enemies.forEach(en => {
                    if (Math.hypot(p.x - en.x, p.y - en.y) < en.size) {
                        en.hp -= player.damage; p.life = 0; createParticles(en.x, en.y, p.color);
                    }
                });
                if (p.life <= 0) projectiles.splice(i, 1);
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                if (!player.isDashing && Math.hypot(p.x - player.x, p.y - player.y) < player.size) {
                    player.hp -= 15; p.life = 0; createParticles(player.x, player.y, '#ff0000', 10);
                }
                if (p.life <= 0) enemyProjectiles.splice(i, 1);
            }

            // Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;

                if (en.type === 'caster' && dist < 450 && now - en.lastShot > 2800) {
                    enemyProjectiles.push({ x: en.x, y: en.y, vx: Math.cos(angle) * 6, vy: Math.sin(angle) * 6, size: 7, life: 110 });
                    en.lastShot = now;
                }

                if (!player.isDashing && dist < player.size) {
                    player.hp -= 0.4; if (player.hp < 0) player.hp = 0;
                }

                if (en.hp <= 0) {
                    createParticles(en.x, en.y, '#f0ad4e', 10); 
                    addToInventory(en.loot);
                    player.gems += en.gems;
                    player.xp += en.xp;
                    if (player.xp >= 100) { player.lvl++; player.xp = 0; player.maxHp += 20; player.maxMp += 10; player.hp = player.maxHp; player.mp = player.maxMp; }
                    enemies.splice(i, 1); updateUI();
                }
            }

            // Interactions
            if (keys[' ']) {
                const biome = biomes[`${player.worldX},${player.worldY}`] || {objects:[]};
                biome.objects.forEach(obj => {
                    if (Math.hypot(player.x - obj.x, player.y - obj.y) < 60) {
                        if (obj.t === 'pond') addToInventory('Mana-Carp');
                        else if (obj.t === 'tree') addToInventory('Iron-Bark Log');
                        else if (obj.t === 'ore') addToInventory('Mana-Infused Ore');
                        if (obj.t !== 'hub') {
                             if (Math.random() < 0.15) { player.gems += 1; createParticles(obj.x, obj.y, '#00ffcc'); }
                             createParticles(obj.x, obj.y, '#ffffff');
                        }
                        keys[' '] = false;
                    }
                });
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function resetBiome() {
            enemies.length = 0; enemyProjectiles.length = 0; projectiles.length = 0;
            const b = biomes[`${player.worldX},${player.worldY}`];
            document.getElementById('biome-info').innerText = `${b?.name || 'Uncharted Void'} (${player.worldX},${player.worldY})`;
            saveGame();
        }

        function addToInventory(item) {
            player.inventory.push(item);
            if (player.inventory.length > 25) player.inventory.shift();
            updateUI();
        }

        function craft(item) {
            const counts = getInventoryCounts();
            if (item === 'Scavenger Bow' && counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1) {
                removeItem('Scavenged Leather', 2); removeItem('Iron-Bark Log', 1);
                player.projSpeed = 16; player.weapon = 'Scavenger Bow'; player.manaCost = 3;
            } else if (item === 'Bone Staff' && counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1) {
                removeItem('Ancient Bone', 3); removeItem('Mana-Infused Ore', 1);
                player.damage = 30; player.weapon = 'Bone Staff'; player.manaCost = 12;
            } else if (item === 'Void Scepter' && counts['Void Essence'] >= 1 && counts['Mana-Crystal'] >= 2) {
                removeItem('Void Essence', 1); removeItem('Mana-Crystal', 2);
                player.damage = 75; player.weapon = 'Void Scepter'; player.manaCost = 30;
            }
            updateUI(); saveGame();
        }

        function getInventoryCounts() { return player.inventory.reduce((acc, item) => { acc[item] = (acc[item] || 0) + 1; return acc; }, {}); }
        function removeItem(name, count) { for(let i=0; i<count; i++) { const idx = player.inventory.indexOf(name); if (idx > -1) player.inventory.splice(idx, 1); } }
        function createParticles(x, y, color, count = 5) { for (let i = 0; i < count; i++) { particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, color, life: 1 }); } }

        function updateUI() {
            document.getElementById('hp-text').innerText = `${Math.ceil(player.hp)}/${player.maxHp}`;
            document.getElementById('hp-fill').style.width = (player.hp / player.maxHp * 100) + "%";
            document.getElementById('mp-text').innerText = `${Math.ceil(player.mp)}/${player.maxMp}`;
            document.getElementById('mp-fill').style.width = (player.mp / player.maxMp * 100) + "%";
            document.getElementById('xp-text').innerText = `LVL ${player.lvl}`;
            document.getElementById('xp-fill').style.width = player.xp + "%";
            document.getElementById('gem-count').innerText = player.gems;
            
            const list = document.getElementById('inv-list');
            const counts = getInventoryCounts();
            list.innerHTML = Object.entries(counts).map(([name, count]) => `<div class="inv-item"><span>${name}</span> <span class="stat">x${count}</span></div>`).reverse().join('');

            const hubDist = Math.hypot(player.x - 500, player.y - 350);
            const inHub = hubDist < 100 && player.worldX === 0 && player.worldY === 0;
            document.getElementById('btn-heal').disabled = !inHub || player.gems < 10 || player.hp >= player.maxHp;
            document.getElementById('btn-sell').disabled = !inHub || player.inventory.length === 0;
            
            document.getElementById('btn-bow').disabled = !(counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1);
            document.getElementById('btn-staff').disabled = !(counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1);
            document.getElementById('btn-scepter').disabled = !(counts['Void Essence'] >= 1 && counts['Mana-Crystal'] >= 2);
            document.getElementById('equipment').innerText = "Wpn: " + player.weapon;
        }

        function draw() {
            const biome = biomes[`${player.worldX},${player.worldY}`] || {color:'#111', tile:'#1a1a1a', objects:[]};
            ctx.fillStyle = biome.color; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Draw Tiles
            ctx.strokeStyle = biome.tile; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            biome.objects.forEach(obj => {
                ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(obj.e, obj.x, obj.y);
                if (obj.t === 'hub') {
                    ctx.font = "12px Arial"; ctx.fillStyle = "#fff"; ctx.fillText("TOWN MERCHANT", obj.x, obj.y - 45);
                }
            });

            enemies.forEach(en => {
                ctx.font = "32px Arial"; ctx.fillText(en.emoji, en.x, en.y);
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(en.x - 15, en.y - 35, (en.hp / en.maxHp) * 30, 4);
            });

            projectiles.forEach(p => { 
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); 
            });
            ctx.fillStyle = "#00ff00"; enemyProjectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.globalAlpha = 1; ctx.font = "40px Arial";
            if (player.isDashing) ctx.globalAlpha = 0.5;
            ctx.fillText("🧙", player.x, player.y); ctx.globalAlpha = 1;

            requestAnimationFrame(() => { update(); draw(); });
        }

        loadGame();
        setInterval(spawnEnemy, 3000);
        draw();
    </script>
</body>
</html>
