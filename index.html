<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Apocalypse - Survival Prototype</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; background: #1a1a1a; border: 4px solid #333; margin: 20px auto; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; width: 250px; }
        #inventory { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; height: 300px; overflow-y: auto; }
        #crafting { position: absolute; bottom: 50px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; }
        .stat { color: #f0ad4e; font-weight: bold; }
        .inv-item { font-size: 12px; border-bottom: 1px solid #333; padding: 5px 0; }
        .header { font-weight: bold; color: #007bff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #log { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; color: #888; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 5px; width: 100%; margin: 2px 0; cursor: pointer; font-size: 10px; }
        button:disabled { color: #666; cursor: not-allowed; opacity: 0.5; }
        button:hover:not(:disabled) { background: #444; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header">Nexus Engine v0.0.5</div>
        <div style="font-size: 11px; margin-bottom: 10px;">WASD: Move | Shift: Dodge | Space: Interact</div>
        <div id="player-stats">
            HP: <span id="hp" class="stat" style="color:#ff4d4d">100</span> | 
            LVL: <span id="lvl" class="stat">1</span><br>
            XP: <span id="xp" class="stat">0</span>/100
        </div>
    </div>

    <div id="inventory">
        <div class="header">Backpack</div>
        <div id="inv-list"></div>
    </div>

    <div id="crafting">
        <div class="header">Wasteland Hub</div>
        <div id="recipes">
            <div style="font-size: 9px; color: #aaa;">FORGE:</div>
            <button onclick="craft('Scavenger Bow')" id="btn-bow" disabled>Craft Bow (2 Lthr, 1 Log)</button>
            <button onclick="craft('Bone Staff')" id="btn-staff" disabled>Craft Staff (3 Bone, 1 Ore)</button>
            <div style="font-size: 9px; color: #aaa; margin-top:5px;">COOKING:</div>
            <button onclick="craft('Seared Fin')" id="btn-cook" disabled>Cook Fish (1 Fish, 1 Log)</button>
        </div>
        <div id="equipment" style="margin-top:10px; font-size: 12px; color: #00ff00;">Weapon: Basic Bolt</div>
    </div>

    <div id="log">Nexus: Hunger and blights. Welcome to the end, Jordan.</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;

        const player = { 
            x: 500, y: 350, size: 30, speed: 4, hp: 100, maxHp: 100, 
            xp: 0, lvl: 1, 
            inventory: [],
            weapon: 'Basic Bolt',
            damage: 10,
            projSpeed: 8,
            lastAttack: 0, attackCooldown: 300,
            dashCooldown: 0, dashTimer: 0, isDashing: false, dashVx: 0, dashVy: 0
        };

        const keys = {};
        const projectiles = [];
        const enemyProjectiles = [];
        const enemies = [];
        const particles = [];
        const worldObjects = [
            { type: 'tree', x: 200, y: 200, emoji: '🌲', label: 'Iron-Bark' },
            { type: 'tree', x: 800, y: 550, emoji: '🌲', label: 'Iron-Bark' },
            { type: 'ore', x: 150, y: 600, emoji: '💎', label: 'Mana-Vein' },
            { type: 'pond', x: 850, y: 150, emoji: '🌀', label: 'Mana-Pool' },
        ];

        const enemyTypes = [
            { type: 'slime', emoji: '🧪', hp: 30, speed: 1.5, xp: 20, loot: 'Slime Core', label: 'Mutated Slime' },
            { type: 'skeleton', emoji: '💀', hp: 60, speed: 1.0, xp: 45, loot: 'Ancient Bone', label: 'Blighted Remains' },
            { type: 'wasp', emoji: '🐝', hp: 15, speed: 3.5, xp: 30, loot: 'Stinger', label: 'Mana-Stinger' },
            { type: 'hound', emoji: '🐕', hp: 40, speed: 2.5, xp: 35, loot: 'Scavenged Leather', label: 'Scavenger Hound' },
            { type: 'caster', emoji: '🧙‍♂️', hp: 50, speed: 0.7, xp: 80, loot: 'Mana-Essence', label: 'Blight-Caster' }
        ];

        function spawnEnemy() {
            if (enemies.length < 10) {
                const config = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                enemies.push({
                    x: Math.random() < 0.5 ? 0 : canvas.width,
                    y: Math.random() * canvas.height,
                    hp: config.hp, maxHp: config.hp, size: 25,
                    speed: config.speed + (player.lvl * 0.1),
                    emoji: config.emoji, label: config.label,
                    xp: config.xp, loot: config.loot, type: config.type,
                    lastShot: 0
                });
            }
        }
        setInterval(spawnEnemy, 3000);

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            // Dodge Roll (Shift)
            if (e.key === 'Shift' && Date.now() > player.dashCooldown) {
                let dx = 0, dy = 0;
                if (keys['w']) dy = -1; if (keys['s']) dy = 1;
                if (keys['a']) dx = -1; if (keys['d']) dx = 1;
                if (dx !== 0 || dy !== 0) {
                    player.isDashing = true;
                    player.dashTimer = 10;
                    player.dashVx = dx * 12;
                    player.dashVy = dy * 12;
                    player.dashCooldown = Date.now() + 1000;
                    createParticles(player.x, player.y, '#fff', 15);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => {
            const now = Date.now();
            if (now - player.lastAttack > player.attackCooldown) {
                const rect = canvas.getBoundingClientRect();
                const angle = Math.atan2((e.clientY - rect.top) - player.y, (e.clientX - rect.left) - player.x);
                projectiles.push({ x: player.x, y: player.y, vx: Math.cos(angle) * player.projSpeed, vy: Math.sin(angle) * player.projSpeed, size: 5, life: 60 });
                player.lastAttack = now;
            }
        });

        function update() {
            const now = Date.now();
            
            // Movement
            if (player.isDashing) {
                player.x += player.dashVx; player.y += player.dashVy;
                player.dashTimer--;
                if (player.dashTimer <= 0) player.isDashing = false;
            } else {
                if (keys['w']) player.y -= player.speed;
                if (keys['s']) player.y += player.speed;
                if (keys['a']) player.x -= player.speed;
                if (keys['d']) player.x += player.speed;
            }

            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                enemies.forEach(en => {
                    if (Math.hypot(p.x - en.x, p.y - en.y) < en.size) {
                        en.hp -= player.damage; p.life = 0; createParticles(en.x, en.y, '#00ff00');
                    }
                });
                if (p.life <= 0) projectiles.splice(i, 1);
            }

            // Enemy Projectiles
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                if (!player.isDashing && Math.hypot(p.x - player.x, p.y - player.y) < player.size) {
                    player.hp -= 12; p.life = 0; createParticles(player.x, player.y, '#ff0000', 10); updateUI();
                }
                if (p.life <= 0) enemyProjectiles.splice(i, 1);
            }

            // Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                
                if (en.type === 'caster' && dist < 300) {
                    if (dist < 200) { en.x -= Math.cos(angle) * en.speed; en.y -= Math.sin(angle) * en.speed; }
                } else {
                    en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;
                }

                if (en.type === 'caster' && dist < 400 && now - en.lastShot > 2500) {
                    enemyProjectiles.push({ x: en.x, y: en.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, size: 6, life: 100 });
                    en.lastShot = now;
                }

                if (!player.isDashing && dist < player.size) {
                    player.hp -= 0.3; if (player.hp < 0) player.hp = 0; updateUI();
                }

                if (en.hp <= 0) {
                    createParticles(en.x, en.y, '#f0ad4e', 10); addToInventory(en.loot);
                    player.xp += en.xp;
                    if (player.xp >= 100) { player.lvl++; player.xp = 0; player.maxHp += 20; player.hp = player.maxHp; }
                    enemies.splice(i, 1); updateUI();
                }
            }

            // Interaction
            if (keys[' ']) {
                worldObjects.forEach(obj => {
                    if (Math.hypot(player.x - obj.x, player.y - obj.y) < 50) {
                        if (obj.type === 'pond') addToInventory('Mana-Carp');
                        else if (obj.type === 'tree') addToInventory('Iron-Bark Log');
                        else addToInventory('Mana-Infused Ore');
                        createParticles(obj.x, obj.y, '#4fc3f7');
                        keys[' '] = false;
                    }
                });
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function addToInventory(item) {
            player.inventory.push(item);
            if (player.inventory.length > 20) player.inventory.shift();
            updateUI();
        }

        function craft(item) {
            const counts = getInventoryCounts();
            if (item === 'Scavenger Bow' && counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1) {
                removeItem('Scavenged Leather', 2); removeItem('Iron-Bark Log', 1);
                player.projSpeed = 15; player.weapon = 'Scavenger Bow';
            } else if (item === 'Bone Staff' && counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1) {
                removeItem('Ancient Bone', 3); removeItem('Mana-Infused Ore', 1);
                player.damage = 25; player.weapon = 'Bone Staff';
            } else if (item === 'Seared Fin' && counts['Mana-Carp'] >= 1 && counts['Iron-Bark Log'] >= 1) {
                removeItem('Mana-Carp', 1); removeItem('Iron-Bark Log', 1);
                player.hp = Math.min(player.maxHp, player.hp + 40);
                console.log("Delicious.");
            }
            updateUI();
        }

        function getInventoryCounts() {
            return player.inventory.reduce((acc, item) => { acc[item] = (acc[item] || 0) + 1; return acc; }, {});
        }

        function removeItem(name, count) {
            for(let i=0; i<count; i++) {
                const idx = player.inventory.indexOf(name);
                if (idx > -1) player.inventory.splice(idx, 1);
            }
        }

        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, color, life: 1 });
            }
        }

        function updateUI() {
            document.getElementById('hp').innerText = Math.ceil(player.hp);
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp').innerText = player.xp;
            const list = document.getElementById('inv-list');
            list.innerHTML = player.inventory.map(i => `<div class="inv-item">${i}</div>`).reverse().join('');
            const counts = getInventoryCounts();
            document.getElementById('btn-bow').disabled = !(counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1);
            document.getElementById('btn-staff').disabled = !(counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1);
            document.getElementById('btn-cook').disabled = !(counts['Mana-Carp'] >= 1 && counts['Iron-Bark Log'] >= 1);
            document.getElementById('equipment').innerText = "Weapon: " + player.weapon;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            worldObjects.forEach(obj => {
                ctx.font = "30px Arial"; ctx.textAlign = "center";
                ctx.fillText(obj.emoji, obj.x, obj.y);
                ctx.font = "10px Arial"; ctx.fillStyle = "#888";
                ctx.fillText(obj.label, obj.x, obj.y + 20);
            });
            enemies.forEach(en => {
                ctx.font = "30px Arial"; ctx.fillText(en.emoji, en.x, en.y);
                ctx.fillStyle = "#333"; ctx.fillRect(en.x - 15, en.y - 30, 30, 4);
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(en.x - 15, en.y - 30, (en.hp / en.maxHp) * 30, 4);
            });
            ctx.fillStyle = "#007bff";
            projectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.fillStyle = "#00ff00";
            enemyProjectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.globalAlpha = 1;
            ctx.font = "40px Arial";
            if (player.isDashing) ctx.globalAlpha = 0.5;
            ctx.fillText("🧙", player.x, player.y);
            ctx.globalAlpha = 1;
            requestAnimationFrame(() => { update(); draw(); });
        }
        draw();
    </script>
</body>
</html>
