<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Apocalypse - World Expansion</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; background: #1a1a1a; border: 4px solid #333; margin: 20px auto; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; width: 250px; }
        #inventory { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; height: 300px; overflow-y: auto; }
        #crafting { position: absolute; bottom: 50px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; }
        .stat { color: #f0ad4e; font-weight: bold; }
        .inv-item { font-size: 11px; border-bottom: 1px solid #333; padding: 4px 0; }
        .header { font-weight: bold; color: #007bff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        #log { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px; font-size: 11px; color: #888; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 5px; width: 100%; margin: 2px 0; cursor: pointer; font-size: 10px; border-radius: 3px; }
        button:disabled { color: #666; cursor: not-allowed; opacity: 0.5; }
        button:hover:not(:disabled) { background: #444; }
        #biome-info { color: #00ff00; font-size: 12px; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header">Nexus Engine v0.0.6</div>
        <div id="player-stats">
            HP: <span id="hp" class="stat" style="color:#ff4d4d">100</span> | 
            LVL: <span id="lvl" class="stat">1</span><br>
            XP: <span id="xp" class="stat">0</span>/100
        </div>
        <div id="biome-info">Location: Starting Forest (0,0)</div>
        <button onclick="saveGame()" style="margin-top:10px; background:#28a745">Manual Save</button>
        <button onclick="resetGame()" style="background:#dc3545">Reset Data</button>
    </div>

    <div id="inventory">
        <div class="header">Backpack</div>
        <div id="inv-list"></div>
    </div>

    <div id="crafting">
        <div class="header">Wasteland Hub</div>
        <div id="recipes">
            <button onclick="craft('Scavenger Bow')" id="btn-bow" disabled>Craft Bow (2 Lthr, 1 Log)</button>
            <button onclick="craft('Bone Staff')" id="btn-staff" disabled>Craft Staff (3 Bone, 1 Ore)</button>
            <button onclick="craft('Seared Fin')" id="btn-cook" disabled>Cook Fish (1 Fish, 1 Log)</button>
        </div>
        <div id="equipment" style="margin-top:10px; font-size: 12px; color: #00ff00;">Weapon: Basic Bolt</div>
    </div>

    <div id="log">Nexus: World persistence enabled. Travel safe, Jordan.</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;

        let player = { 
            x: 500, y: 350, size: 30, speed: 4, hp: 100, maxHp: 100, 
            xp: 0, lvl: 1, 
            inventory: [],
            weapon: 'Basic Bolt',
            damage: 10,
            projSpeed: 8,
            lastAttack: 0, attackCooldown: 300,
            dashCooldown: 0, dashTimer: 0, isDashing: false, dashVx: 0, dashVy: 0,
            worldX: 0, worldY: 0
        };

        const keys = {};
        const projectiles = [];
        const enemyProjectiles = [];
        const enemies = [];
        const particles = [];
        
        const biomes = {
            '0,0': { name: 'Starting Forest', color: '#1a2a1a', objects: [{t:'tree',x:200,y:200,e:'🌲'}, {t:'tree',x:800,y:500,e:'🌲'}], spawn: ['slime', 'wasp'] },
            '1,0': { name: 'Desolate Ruins', color: '#2a221a', objects: [{t:'ore',x:500,y:300,e:'💎'}, {t:'ore',x:200,y:600,e:'💎'}], spawn: ['skeleton', 'hound'] },
            '0,1': { name: 'Mana Swamp', color: '#1a1a2a', objects: [{t:'pond',x:400,y:400,e:'🌀'}, {t:'tree',x:700,y:100,e:'🌲'}], spawn: ['caster', 'slime'] },
            '1,1': { name: 'The Void Crater', color: '#111', objects: [{t:'ore',x:800,y:100,e:'💎'}, {t:'pond',x:100,y:600,e:'🌀'}], spawn: ['wraith', 'golem'] }
        };

        const enemyTypes = {
            'slime': { emoji: '🧪', hp: 30, speed: 1.5, xp: 20, loot: 'Slime Core' },
            'skeleton': { emoji: '💀', hp: 60, speed: 1.0, xp: 45, loot: 'Ancient Bone' },
            'wasp': { emoji: '🐝', hp: 15, speed: 3.5, xp: 30, loot: 'Stinger' },
            'hound': { emoji: '🐕', hp: 40, speed: 2.5, xp: 35, loot: 'Scavenged Leather' },
            'caster': { emoji: '🧙‍♂️', hp: 50, speed: 0.7, xp: 80, loot: 'Mana-Essence' },
            'wraith': { emoji: '👻', hp: 100, speed: 0.8, xp: 150, loot: 'Void Essence' },
            'golem': { emoji: '🗿', hp: 300, speed: 0.4, xp: 500, loot: 'Mana-Crystal' }
        };

        function saveGame() {
            localStorage.setItem('nexus_save', JSON.stringify(player));
            document.getElementById('log').innerText = "Nexus: Game Saved at " + new Date().toLocaleTimeString();
        }

        function loadGame() {
            const saved = localStorage.getItem('nexus_save');
            if (saved) {
                const data = JSON.parse(saved);
                player = {...player, ...data};
                updateUI();
                document.getElementById('log').innerText = "Nexus: Welcome back, " + (player.lvl > 1 ? "Veteran." : "Wanderer.");
            }
        }

        function resetGame() {
            if(confirm("Erase all progress?")) {
                localStorage.removeItem('nexus_save');
                location.reload();
            }
        }

        function spawnEnemy() {
            const biome = biomes[`${player.worldX},${player.worldY}`] || biomes['0,0'];
            if (enemies.length < 8) {
                const type = biome.spawn[Math.floor(Math.random() * biome.spawn.length)];
                const config = enemyTypes[type];
                enemies.push({
                    x: Math.random() < 0.5 ? 0 : canvas.width,
                    y: Math.random() * canvas.height,
                    hp: config.hp, maxHp: config.hp, size: 25,
                    speed: config.speed + (player.lvl * 0.1),
                    emoji: config.emoji, xp: config.xp, loot: config.loot, type: type, lastShot: 0
                });
            }
        }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'Shift' && Date.now() > player.dashCooldown) {
                let dx = 0, dy = 0;
                if (keys['w']) dy = -1; if (keys['s']) dy = 1;
                if (keys['a']) dx = -1; if (keys['d']) dx = 1;
                if (dx !== 0 || dy !== 0) {
                    player.isDashing = true; player.dashTimer = 10;
                    player.dashVx = dx * 12; player.dashVy = dy * 12;
                    player.dashCooldown = Date.now() + 1000;
                    createParticles(player.x, player.y, '#fff', 15);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => {
            const now = Date.now();
            if (now - player.lastAttack > player.attackCooldown) {
                const rect = canvas.getBoundingClientRect();
                const angle = Math.atan2((e.clientY - rect.top) - player.y, (e.clientX - rect.left) - player.x);
                projectiles.push({ x: player.x, y: player.y, vx: Math.cos(angle) * player.projSpeed, vy: Math.sin(angle) * player.projSpeed, size: 5, life: 60 });
                player.lastAttack = now;
            }
        });

        function update() {
            const now = Date.now();
            if (player.isDashing) {
                player.x += player.dashVx; player.y += player.dashVy;
                player.dashTimer--; if (player.dashTimer <= 0) player.isDashing = false;
            } else {
                if (keys['w']) player.y -= player.speed;
                if (keys['s']) player.y += player.speed;
                if (keys['a']) player.x -= player.speed;
                if (keys['d']) player.x += player.speed;
            }

            // Map Transitions
            let transitioned = false;
            if (player.x < 0) { player.worldX--; player.x = canvas.width - 40; transitioned = true; }
            if (player.x > canvas.width) { player.worldX++; player.x = 40; transitioned = true; }
            if (player.y < 0) { player.worldY--; player.y = canvas.height - 40; transitioned = true; }
            if (player.y > canvas.height) { player.worldY++; player.y = 40; transitioned = true; }
            
            if (transitioned) {
                enemies.length = 0; enemyProjectiles.length = 0; projectiles.length = 0;
                document.getElementById('biome-info').innerText = `Location: ${biomes[`${player.worldX},${player.worldY}`]?.name || 'Uncharted Void'} (${player.worldX},${player.worldY})`;
                saveGame();
            }

            // Collision & Combat (Same as v0.0.5 but with biome-based spawns)
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                enemies.forEach(en => {
                    if (Math.hypot(p.x - en.x, p.y - en.y) < en.size) {
                        en.hp -= player.damage; p.life = 0; createParticles(en.x, en.y, '#00ff00');
                    }
                });
                if (p.life <= 0) projectiles.splice(i, 1);
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                if (!player.isDashing && Math.hypot(p.x - player.x, p.y - player.y) < player.size) {
                    player.hp -= 12; p.life = 0; createParticles(player.x, player.y, '#ff0000', 10); updateUI();
                }
                if (p.life <= 0) enemyProjectiles.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;

                if (en.type === 'caster' && dist < 400 && now - en.lastShot > 2500) {
                    enemyProjectiles.push({ x: en.x, y: en.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, size: 6, life: 100 });
                    en.lastShot = now;
                }

                if (!player.isDashing && dist < player.size) {
                    player.hp -= 0.3; if (player.hp < 0) player.hp = 0; updateUI();
                }

                if (en.hp <= 0) {
                    createParticles(en.x, en.y, '#f0ad4e', 10); addToInventory(en.loot);
                    player.xp += en.xp;
                    if (player.xp >= 100) { player.lvl++; player.xp = 0; player.maxHp += 20; player.hp = player.maxHp; }
                    enemies.splice(i, 1); updateUI();
                }
            }

            if (keys[' ']) {
                const currentBiome = biomes[`${player.worldX},${player.worldY}`] || {objects:[]};
                currentBiome.objects.forEach(obj => {
                    if (Math.hypot(player.x - obj.x, player.y - obj.y) < 50) {
                        if (obj.t === 'pond') addToInventory('Mana-Carp');
                        else if (obj.t === 'tree') addToInventory('Iron-Bark Log');
                        else addToInventory('Mana-Infused Ore');
                        createParticles(obj.x, obj.y, '#4fc3f7');
                        keys[' '] = false;
                    }
                });
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function addToInventory(item) {
            player.inventory.push(item);
            if (player.inventory.length > 20) player.inventory.shift();
            updateUI();
        }

        function craft(item) {
            const counts = getInventoryCounts();
            if (item === 'Scavenger Bow' && counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1) {
                removeItem('Scavenged Leather', 2); removeItem('Iron-Bark Log', 1);
                player.projSpeed = 15; player.weapon = 'Scavenger Bow';
            } else if (item === 'Bone Staff' && counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1) {
                removeItem('Ancient Bone', 3); removeItem('Mana-Infused Ore', 1);
                player.damage = 25; player.weapon = 'Bone Staff';
            } else if (item === 'Seared Fin' && counts['Mana-Carp'] >= 1 && counts['Iron-Bark Log'] >= 1) {
                removeItem('Mana-Carp', 1); removeItem('Iron-Bark Log', 1);
                player.hp = Math.min(player.maxHp, player.hp + 40);
            }
            updateUI(); saveGame();
        }

        function getInventoryCounts() { return player.inventory.reduce((acc, item) => { acc[item] = (acc[item] || 0) + 1; return acc; }, {}); }
        function removeItem(name, count) { for(let i=0; i<count; i++) { const idx = player.inventory.indexOf(name); if (idx > -1) player.inventory.splice(idx, 1); } }
        function createParticles(x, y, color, count = 5) { for (let i = 0; i < count; i++) { particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, color, life: 1 }); } }

        function updateUI() {
            document.getElementById('hp').innerText = Math.ceil(player.hp);
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp').innerText = player.xp;
            const list = document.getElementById('inv-list');
            list.innerHTML = player.inventory.map(i => `<div class="inv-item">${i}</div>`).reverse().join('');
            const counts = getInventoryCounts();
            document.getElementById('btn-bow').disabled = !(counts['Scavenged Leather'] >= 2 && counts['Iron-Bark Log'] >= 1);
            document.getElementById('btn-staff').disabled = !(counts['Ancient Bone'] >= 3 && counts['Mana-Infused Ore'] >= 1);
            document.getElementById('btn-cook').disabled = !(counts['Mana-Carp'] >= 1 && counts['Iron-Bark Log'] >= 1);
            document.getElementById('equipment').innerText = "Weapon: " + player.weapon;
        }

        function draw() {
            const currentBiome = biomes[`${player.worldX},${player.worldY}`] || {color:'#111', objects:[], name:'Void'};
            ctx.fillStyle = currentBiome.color;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            currentBiome.objects.forEach(obj => {
                ctx.font = "30px Arial"; ctx.textAlign = "center"; ctx.fillText(obj.e, obj.x, obj.y);
            });
            enemies.forEach(en => {
                ctx.font = "30px Arial"; ctx.fillText(en.emoji, en.x, en.y);
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(en.x - 15, en.y - 30, (en.hp / en.maxHp) * 30, 4);
            });
            ctx.fillStyle = "#007bff"; projectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.fillStyle = "#00ff00"; enemyProjectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.globalAlpha = 1; ctx.font = "40px Arial";
            if (player.isDashing) ctx.globalAlpha = 0.5;
            ctx.fillText("🧙", player.x, player.y); ctx.globalAlpha = 1;
            requestAnimationFrame(() => { update(); draw(); });
        }

        loadGame();
        setInterval(spawnEnemy, 3000);
        draw();
    </script>
</body>
</html>
